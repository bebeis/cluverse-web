<!DOCTYPE html>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display antialiased overflow-x-hidden min-h-screen flex flex-col">

<div class="flex items-center gap-8">

<div class="flex flex-1 justify-end gap-8 items-center">

<a class="text-slate-700 dark:text-slate-300 hover:text-primary dark:hover:text-primary text-sm font-medium transition-colors" href="#">그룹 찾기</a>

<input class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-900/50 text-slate-900 dark:text-white px-4 py-3 text-base placeholder:text-slate-400 focus:border-indigo-500 focus:ring-indigo-500 dark:focus:border-indigo-500 dark:focus:ring-indigo-500 transition-colors shadow-sm" id="post-title" placeholder="제목을 입력하세요" type="text"/>
</div>
<div class="space-y-3">
<label class="block text-slate-900 dark:text-slate-100 text-base font-semibold" for="post-content">내용</label>
<div class="relative group">
<div class="flex items-center gap-1 p-2 border border-b-0 border-slate-300 dark:border-slate-700 rounded-t-lg bg-slate-50 dark:bg-slate-800/50">

<span class="material-symbols-outlined text-[20px]">format_bold</span>
</button>
<button class="p-1.5 text-slate-500 hover:text-slate-900 dark:hover:text-white rounded hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined text-[20px]">format_italic</span>
</button>
<button class="p-1.5 text-slate-500 hover:text-slate-900 dark:hover:text-white rounded hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined text-[20px]">format_underlined</span>
</button>
<div class="w-px h-5 bg-slate-300 dark:bg-slate-600 mx-1"></div>
<button class="p-1.5 text-slate-500 hover:text-slate-900 dark:hover:text-white rounded hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined text-[20px]">image</span>
</button>
<button class="p-1.5 text-slate-500 hover:text-slate-900 dark:hover:text-white rounded hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined text-[20px]">link</span>
</button>
</div>
<textarea class="w-full min-h-[320px] rounded-b-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900/50 text-slate-900 dark:text-white px-4 py-3 text-base placeholder:text-slate-400 focus:border-indigo-500 focus:ring-indigo-500 dark:focus:border-indigo-500 dark:focus:ring-indigo-500 transition-colors resize-y" id="post-content" placeholder="자유롭게 내용을 작성해주세요."></textarea>
</div>
</div>
<div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 p-4 rounded-lg bg-slate-50 dark:bg-slate-800/30 border border-slate-100 dark:border-slate-700/50">

<div class="bg-slate-200 dark:bg-slate-700 p-2 rounded-full">
<span class="material-symbols-outlined text-slate-500 dark:text-slate-400">attach_file</span>
</div>
<div class="text-sm">

<span class="block text-slate-500 dark:text-slate-400 text-xs mt-0.5">이미지, 문서 등 최대 10MB까지 업로드 가능</span>
</div>
</div>
<button class="px-4 py-2 text-sm font-medium text-indigo-600 dark:text-indigo-400 bg-white dark:bg-slate-800 border border-indigo-200 dark:border-slate-600 rounded-lg hover:bg-indigo-50 dark:hover:bg-slate-700 transition-colors shadow-sm">

</div>
</div>
<div class="bg-slate-50 dark:bg-[#111a23] p-8 border-t border-slate-200 dark:border-slate-800">

<div>

</div>
<p class="text-sm text-slate-600 dark:text-slate-400 leading-snug">
                                     현재 <span class="font-medium text-slate-800 dark:text-slate-200">'비공개 그룹'</span>에 게시글을 작성 중입니다. 그룹 정책상 게시글을 외부로 공유할 수 없습니다.
                                 </p>
</div>
</div>
<div class="flex items-center gap-3 pl-2 md:pl-0 md:border-l md:border-slate-300 md:dark:border-slate-600 md:ml-2">
<div class="flex flex-col items-end md:w-32">
<label class="text-xs font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1" for="public-toggle">External Share</label>
<span class="text-xs text-slate-400 font-medium">비활성화됨</span>
</div>
<div class="relative inline-block w-11 h-6 align-middle select-none opacity-50 cursor-not-allowed">
<input class="toggle-checkbox absolute block w-4 h-4 rounded-full bg-white border-none appearance-none cursor-not-allowed top-1 left-1 transition-all duration-300" disabled="" id="public-toggle" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-slate-300 cursor-not-allowed" for="public-toggle"></label>
</div>
</div>
</div>
</div>
<div class="flex justify-end items-center gap-3">
<button class="px-6 py-2.5 rounded-lg text-slate-600 dark:text-slate-300 font-medium hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">

<button class="px-8 py-2.5 rounded-lg bg-indigo-600 hover:bg-indigo-700 text-white font-semibold shadow-md shadow-indigo-500/20 hover:shadow-indigo-500/40 transition-all flex items-center gap-2">
<span>등록하기</span>
<span class="material-symbols-outlined text-[18px]">send</span>
</button>
</div>
</div>
</div>
