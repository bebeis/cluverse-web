<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cluverse 온보딩 - 1단계</title>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1313ec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101022",
                    },
                    fontFamily: {
                        "display": ["Spline Sans", "Noto Sans KR", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col font-display antialiased">
<header class="flex items-center justify-between whitespace-nowrap border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-[#15152a] px-10 py-4 sticky top-0 z-50">
<div class="flex items-center gap-4 text-slate-900 dark:text-white">
<div class="size-8 text-primary">
<svg class="w-full h-full" fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M42.4379 44C42.4379 44 36.0744 33.9038 41.1692 24C46.8624 12.9336 42.2078 4 42.2078 4L7.01134 4C7.01134 4 11.6577 12.932 5.96912 23.9969C0.876273 33.9029 7.27094 44 7.27094 44L42.4379 44Z" fill="currentColor"></path>
</svg>
</div>
<h2 class="text-xl font-bold leading-tight tracking-tight">Cluverse</h2>
</div>
<div class="flex items-center gap-8">
<button class="text-slate-600 dark:text-slate-400 text-sm font-medium hover:text-primary transition-colors">도움말 및 지원</button>
<button class="flex items-center justify-center overflow-hidden rounded-lg h-9 px-4 bg-primary/10 text-primary hover:bg-primary/20 transition-colors text-sm font-bold">
<span class="truncate">저장 및 종료</span>
</button>
</div>
</header>
<main class="flex-1 flex justify-center py-10 px-4 sm:px-6 lg:px-8">
<div class="w-full max-w-[640px] flex flex-col gap-8">
<div class="flex flex-col gap-3">
<div class="flex justify-between items-center">
<p class="text-slate-900 dark:text-white text-sm font-semibold uppercase tracking-wider">1/3 단계</p>
<span class="text-slate-500 dark:text-slate-400 text-sm">33% 완료</span>
</div>
<div class="h-2 w-full rounded-full bg-slate-200 dark:bg-slate-700 overflow-hidden">
<div class="h-full rounded-full bg-primary" style="width: 33%;"></div>
</div>
</div>
<div class="flex flex-col gap-2">
<h1 class="text-slate-900 dark:text-white text-3xl sm:text-4xl font-black leading-tight tracking-tight">학교를 선택해 주세요</h1>
<p class="text-slate-500 dark:text-slate-400 text-lg">커뮤니티를 찾을 수 있도록 재학 중인 학교를 알려주세요.</p>
</div>
<div class="flex flex-col gap-6 bg-white dark:bg-[#15152a] rounded-xl p-6 sm:p-8 border border-slate-200 dark:border-slate-800 shadow-sm">
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-white text-base font-semibold">대학교</label>
<div class="relative group">
<input class="w-full h-14 pl-12 pr-4 rounded-lg bg-slate-50 dark:bg-[#1c1c33] border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all" placeholder="학교 검색 (예: 고려대학교)" type="text" value="고려대학교"/>
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined">search</span>
</span>
<div class="absolute right-3 top-1/2 -translate-y-1/2">
<span class="material-symbols-outlined text-green-500">check_circle</span>
</div>
</div>
<div class="mt-2 flex items-center gap-3 p-3 bg-primary/5 border border-primary/20 rounded-lg animate-in fade-in slide-in-from-top-2 duration-300">
<div class="size-10 rounded-full bg-white dark:bg-slate-800 flex items-center justify-center p-1 shadow-sm border border-slate-100 dark:border-slate-700">
<div class="w-full h-full rounded-full bg-contain bg-center bg-no-repeat" data-alt="Korea University Logo" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuB8MTFdk9cYHbb3ABJMuPsT2gwtR2uvx4aGDoE84L1RpFdwe61k4eOYWaNJigp4qt5uaWn7h15Wz4TZnB__0icS-FyJnIhvDNo5mjrtZUZV-VzsdfpbJP-756pHEUGbZjMzTwHMcOpngSW1qF7o6FI9sYz5wxrWLcJudayAvkVIhFaGOD--plMHrbQfyELGY26KTWD0Vq0Gv6ghS9V_VUzHFm_-qxv0DJLYt9jzE_xRST1w1LUSPfd2FADTqlkZyq7ahvdG3h916p2I");'></div>
</div>
<div class="flex flex-col">
<span class="text-slate-900 dark:text-white font-semibold text-sm">고려대학교</span>
<span class="text-slate-500 dark:text-slate-400 text-xs">대한민국 서울</span>
</div>
<button class="ml-auto text-slate-400 hover:text-slate-600 dark:hover:text-slate-200">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-white text-base font-semibold flex gap-1">
                    주전공 <span class="text-primary">*</span>
</label>
<div class="relative">
<input class="w-full h-14 pl-4 pr-4 rounded-lg bg-slate-50 dark:bg-[#1c1c33] border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all" placeholder="전공을 입력하세요" type="text"/>
</div>
</div>
<div class="flex flex-col gap-3 pt-2">
<div class="flex justify-between items-center">
<label class="text-slate-900 dark:text-white text-base font-semibold">복수전공 / 부전공</label>
<span class="text-slate-400 dark:text-slate-500 text-sm">선택사항</span>
</div>
<div class="flex items-center gap-3">
<div class="flex-1 relative">
<input class="w-full h-12 pl-4 pr-10 rounded-lg bg-slate-50 dark:bg-[#1c1c33] border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white focus:outline-none focus:border-primary transition-all text-sm" readonly="" type="text" value="컴퓨터공학"/>
<span class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400">
<span class="material-symbols-outlined text-[18px]">lock</span>
</span>
</div>
<button class="p-2 text-slate-400 hover:text-red-500 transition-colors rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20">
<span class="material-symbols-outlined">delete</span>
</button>
</div>
<button class="flex items-center justify-center gap-2 w-full h-12 border-2 border-dashed border-slate-300 dark:border-slate-700 rounded-lg text-slate-600 dark:text-slate-400 hover:border-primary hover:text-primary hover:bg-primary/5 transition-all text-sm font-medium">
<span class="material-symbols-outlined text-[20px]">add</span>
                    다른 전공 또는 부전공 추가
                </button>
</div>
</div>
<div class="flex flex-col sm:flex-row gap-4 pt-4">
<button class="order-2 sm:order-1 flex-1 h-12 rounded-lg bg-transparent text-slate-500 dark:text-slate-400 font-bold hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                뒤로
            </button>
<button class="order-1 sm:order-2 flex-[2] h-12 rounded-lg bg-primary hover:bg-primary/90 text-white font-bold shadow-lg shadow-primary/30 transition-all transform active:scale-[0.99] flex items-center justify-center gap-2">
                다음 단계로 이동
                <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</div>
</div>
</main>

</body></html>
