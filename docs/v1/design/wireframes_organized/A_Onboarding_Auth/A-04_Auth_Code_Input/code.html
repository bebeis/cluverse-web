<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cluverse - 인증 코드 입력</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&amp;family=Noto+Sans+KR:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4051b5", 
                        "primary-dark": "#303f9f",
                        "accent": "#00E5FF",
                        "background-light": "#f6f6f8",
                        "background-dark": "#14161e",
                        "surface-light": "#ffffff",
                        "surface-dark": "#1e212b",
                        "text-main": "#111218",
                        "text-sub": "#5d6389",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "Noto Sans KR", "sans-serif"],
                        "body": ["Noto Sans KR", "sans-serif"],
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Noto Sans KR', 'Plus Jakarta Sans', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .filled-icon {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-text-main antialiased min-h-screen flex flex-col font-body">
<header class="sticky top-0 z-50 w-full bg-surface-light/95 backdrop-blur border-b border-gray-200 dark:bg-surface-dark/95 dark:border-gray-800">
<div class="max-w-[1200px] mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex h-16 items-center justify-center sm:justify-between gap-4">
<div class="flex items-center gap-2 cursor-pointer">
<div class="flex items-center justify-center size-8 rounded-lg bg-primary text-white">
<span class="material-symbols-outlined text-xl">diversity_3</span>
</div>
<h1 class="font-display text-xl font-bold text-gray-900 dark:text-white tracking-tight">Cluverse</h1>
</div>
</div>
</div>
</header>
<main class="flex-grow flex items-center justify-center px-4 py-12 sm:px-6 lg:px-8">
<div class="w-full max-w-md space-y-8 bg-surface-light dark:bg-surface-dark p-8 rounded-2xl shadow-xl border border-gray-100 dark:border-gray-800">
<div class="flex items-center justify-center space-x-4 mb-8">
<div class="flex items-center">
<div class="flex items-center justify-center w-8 h-8 rounded-full bg-primary/20 text-primary font-bold text-sm">
<span class="material-symbols-outlined text-lg">check</span>
</div>
<div class="h-1 w-8 bg-primary/20 mx-2 rounded-full"></div>
</div>
<div class="flex items-center">
<div class="flex items-center justify-center w-8 h-8 rounded-full bg-primary text-white font-bold text-sm shadow-lg shadow-primary/30">2</div>
</div>
<div class="h-1 w-8 bg-gray-200 dark:bg-gray-700 mx-2 rounded-full"></div>
<div class="flex items-center justify-center w-8 h-8 rounded-full bg-gray-200 dark:bg-gray-700 text-gray-400 font-bold text-sm">3</div>
</div>
<div class="text-center">
<div class="mx-auto flex h-16 w-16 items-center justify-center rounded-full bg-indigo-50 dark:bg-indigo-900/20 mb-4">
<span class="material-symbols-outlined text-3xl text-primary">mark_email_read</span>
</div>
<h2 class="text-2xl font-bold tracking-tight text-gray-900 dark:text-white">인증 코드를 입력해주세요</h2>
<p class="mt-2 text-sm text-gray-500 dark:text-gray-400">
<span class="font-medium text-gray-900 dark:text-gray-200">student@university.ac.kr</span>으로<br/>
                    6자리 인증 코드를 전송했습니다.
                </p>
</div>
<form action="#" class="mt-8 space-y-6" method="POST">
<div class="space-y-4">
<div>
<label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2" for="verification-code">인증 코드 6자리</label>
<div class="relative">
<input autocomplete="one-time-code" class="block w-full rounded-xl border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-900 px-4 py-3 text-gray-900 dark:text-white placeholder-gray-400 focus:border-primary focus:ring-primary sm:text-lg tracking-widest text-center font-bold" id="verification-code" inputmode="numeric" maxlength="6" name="code" placeholder="000000" required="" type="text"/>
<div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none">
<span class="text-accent font-bold font-mono">02:59</span>
</div>
</div>
</div>
</div>
<div class="flex items-center justify-between text-sm">
<a class="font-medium text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 transition-colors" href="#">
                        메일이 오지 않았나요?
                    </a>
<button class="font-semibold text-primary hover:text-primary-dark transition-colors" type="button">
                        인증 코드 재전송
                    </button>
</div>
<div class="space-y-3 pt-2">
<button class="group relative flex w-full justify-center rounded-xl bg-primary px-4 py-3.5 text-sm font-bold text-white shadow-lg shadow-primary/30 hover:bg-primary-dark focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition-all active:scale-[0.98]" type="submit">
<span class="absolute inset-y-0 left-0 flex items-center pl-3">
<span class="material-symbols-outlined text-white/70 group-hover:text-white transition-colors">lock_open</span>
</span>
                        인증하기
                    </button>
<button class="w-full flex justify-center rounded-xl bg-transparent px-4 py-3 text-sm font-medium text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 transition-colors" type="button">
                        이전 단계로 돌아가기
                    </button>
</div>
</form>
<div class="mt-6 rounded-lg bg-gray-50 dark:bg-gray-800/50 p-4 border border-gray-100 dark:border-gray-700/50">
<div class="flex">
<div class="flex-shrink-0">
<span class="material-symbols-outlined text-gray-400 text-sm">info</span>
</div>
<div class="ml-3">
<h3 class="text-xs font-medium text-gray-800 dark:text-gray-200">메일 확인이 안되시나요?</h3>
<div class="mt-1 text-xs text-gray-500 dark:text-gray-400">
<ul class="list-disc space-y-1 pl-4" role="list">
<li>스팸 메일함을 확인해주세요.</li>
<li>학교 웹메일 용량이 가득 찼는지 확인해주세요.</li>
<li>메일 전송까지 최대 5분이 소요될 수 있습니다.</li>
</ul>
</div>
</div>
</div>
</div>
</div>
</main>
<footer class="py-6 text-center text-xs text-gray-400 dark:text-gray-600">
<p>© 2024 Cluverse Inc. All rights reserved.</p>
</footer>

</body></html>
