<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cluverse - 로그인</title>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;family=Noto+Sans+KR:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#5b13ec",
                        "primary-hover": "#4a0bc4",
                        "background-light": "#f6f6f8",
                        "background-dark": "#161022",
                        "text-main": "#1e1b4b", // Deep indigo-slate
                        "text-sub": "#6366f1", // Lighter indigo for accents
                        "kakao": "#FEE500",
                        "kakao-label": "#191919",
                        "google": "#FFFFFF",
                        "google-border": "#dadce0",
                    },
                    fontFamily: {
                        "display": ["Spline Sans", "Noto Sans KR", "sans-serif"],
                        "body": ["Noto Sans KR", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Noto Sans KR', sans-serif; }
        .font-display { font-family: 'Spline Sans', 'Noto Sans KR', sans-serif; }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col font-display antialiased selection:bg-primary selection:text-white">
<!-- Header / Navbar -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-slate-200 dark:border-slate-800 px-6 lg:px-10 py-4 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md sticky top-0 z-50">
<div class="flex items-center gap-3">
<div class="size-8 text-primary flex items-center justify-center">
<span class="material-symbols-outlined text-3xl font-bold">hub</span>
</div>
<h2 class="text-slate-900 dark:text-white text-xl font-bold leading-tight tracking-tight">Cluverse</h2>
</div>
<div class="hidden sm:flex gap-3">
<a class="flex min-w-[84px] cursor-pointer items-center justify-center rounded-lg h-9 px-4 text-slate-600 dark:text-slate-300 hover:text-primary dark:hover:text-primary text-sm font-bold transition-colors" href="#">
<span>문의하기</span>
</a>
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-9 px-4 bg-primary text-white hover:bg-primary-hover text-sm font-bold transition-colors shadow-sm shadow-primary/30">
<span>회원가입</span>
</button>
</div>
</header>
<!-- Main Content -->
<main class="flex-grow flex flex-col items-center justify-center p-4 sm:p-6 lg:p-8">
<div class="layout-content-container flex flex-col max-w-[1024px] w-full bg-white dark:bg-slate-900 rounded-2xl shadow-xl overflow-hidden md:flex-row min-h-[600px] border border-slate-100 dark:border-slate-800">
<!-- Illustration Section (Left Side on Desktop) -->
<div class="w-full md:w-1/2 bg-gradient-to-br from-primary via-[#7c3aed] to-[#4f46e5] relative flex flex-col justify-between p-8 lg:p-12 text-white overflow-hidden">
<div class="absolute inset-0 opacity-20 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]"></div>
<!-- Decorative Circles -->
<div class="absolute top-[-20%] right-[-10%] w-64 h-64 rounded-full bg-white/10 blur-3xl"></div>
<div class="absolute bottom-[-10%] left-[-20%] w-80 h-80 rounded-full bg-indigo-300/20 blur-3xl"></div>
<div class="relative z-10">
<div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-white/20 backdrop-blur-sm border border-white/10 mb-6 w-fit">
<span class="material-symbols-outlined text-sm">school</span>
<span class="text-xs font-semibold tracking-wide uppercase">University Hub</span>
</div>
<h1 class="text-3xl lg:text-4xl font-bold leading-tight mb-4">
                        대학 간 장벽을 넘는<br/>연결, 클루버스
                    </h1>
<p class="text-indigo-100 text-lg leading-relaxed max-w-sm">
                        전국 400여개 대학의 친구들과 관심사로 연결되세요. 학업, 취미, 프로젝트까지 모든 것이 가능합니다.
                    </p>
</div>
<div class="relative z-10 mt-8 md:mt-0 flex justify-center">
<img alt="Diverse group of students collaborating and connecting" class="rounded-xl shadow-lg border-4 border-white/20 w-full max-w-[320px] object-cover h-48 md:h-56 transform rotate-2 hover:rotate-0 transition-transform duration-500" data-alt="Students connecting across universities" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBAWJIwZSoAIszNmtiOROaa-uUcwIrDaNbVdNbz4YEv39SUWjsiGgyhlGSVlmj_g86Hl8fJ8S_67229r2ggdfl80TSfYwkjJE1jWdmL6TyHCWsgyn-v7Hpuq-OSk3_hVWC56669xoIZrvicWR9xmWAIdLCkqEcT0-xkKDRRwQwGrCv5rBsD6o_iC9sbFe9CUqpfz3j6q0pDU4KYP2usaOqoau8voFpqyALXNNfKVsEHRnKMUD9z4W9brxorB7ebvKTGydpudbfD9ds7"/>
</div>
<div class="relative z-10 mt-6 flex gap-4 text-sm font-medium text-indigo-100">
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-lg">group</span>
<span>누적 가입자 50만+</span>
</div>
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-lg">verified</span>
<span>학교 인증 100%</span>
</div>
</div>
</div>
<!-- Form Section (Right Side on Desktop) -->
<div class="w-full md:w-1/2 p-8 lg:p-12 flex flex-col justify-center bg-white dark:bg-slate-900">
<div class="max-w-[400px] mx-auto w-full">
<h2 class="text-2xl font-bold text-slate-900 dark:text-white mb-2">다시 오신 것을 환영해요! 👋</h2>
<p class="text-slate-500 dark:text-slate-400 mb-8">오늘도 클루버스에서 새로운 영감을 얻어가세요.</p>
<!-- Login Form -->
<form class="space-y-5">
<div class="space-y-1">
<label class="text-sm font-bold text-slate-700 dark:text-slate-300" for="email">이메일</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">mail</span>
<input class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400 text-slate-900 dark:text-white" id="email" placeholder="example@university.ac.kr" type="email"/>
</div>
</div>
<div class="space-y-1">
<div class="flex justify-between items-center">
<label class="text-sm font-bold text-slate-700 dark:text-slate-300" for="password">비밀번호</label>
<a class="text-xs font-semibold text-primary hover:text-primary-hover" href="#">비밀번호 찾기</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">lock</span>
<input class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400 text-slate-900 dark:text-white" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<button class="w-full bg-primary hover:bg-primary-hover text-white font-bold py-3.5 rounded-lg shadow-lg shadow-primary/25 transition-all active:scale-[0.98] flex items-center justify-center gap-2" type="button">
<span>로그인</span>
<span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</form>
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-200 dark:border-slate-700"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-2 bg-white dark:bg-slate-900 text-slate-500">소셜 계정으로 계속하기</span>
</div>
</div>
<div class="flex flex-col gap-3">
<button class="w-full bg-[#FEE500] hover:bg-[#FDD835] text-[#191919] font-bold py-3 rounded-lg transition-colors flex items-center justify-center gap-2">
<svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 3C6.477 3 2 6.425 2 10.65C2 13.375 3.793 15.772 6.536 17.068C6.384 17.625 5.918 19.344 5.862 19.64C5.839 19.824 6.069 19.957 6.223 19.845C7.265 19.121 9.873 17.265 10.59 16.766C11.047 16.822 11.521 16.85 12 16.85C17.523 16.85 22 13.425 22 9.2C22 4.975 17.523 3 12 3Z"></path>
</svg>
                            카카오로 시작하기
                        </button>
<button class="w-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 font-bold py-3 rounded-lg transition-colors flex items-center justify-center gap-2">
<svg class="w-5 h-5" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                            Google로 시작하기
                        </button>
</div>
<p class="text-center text-sm text-slate-500 mt-8">
                        아직 회원이 아니신가요? 
                        <a class="text-primary font-bold hover:underline" href="#">회원가입 하기</a>
</p>
</div>
</div>
</div>
<!-- Footer Links -->
<div class="mt-8 flex gap-6 text-sm text-slate-500 dark:text-slate-400">
<a class="hover:text-primary transition-colors" href="#">이용약관</a>
<span class="w-px h-3 bg-slate-300 dark:bg-slate-700 self-center"></span>
<a class="hover:text-primary transition-colors" href="#">개인정보처리방침</a>
<span class="w-px h-3 bg-slate-300 dark:bg-slate-700 self-center"></span>
<a class="hover:text-primary transition-colors" href="#">도움말</a>
</div>
</main>
</body></html>
