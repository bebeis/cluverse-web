<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cluverse Onboarding - Major Selection</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&amp;family=Noto+Sans+KR:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1919e6",
                        "primary-hover": "#1414b8",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111121",
                        "text-main": "#0e0e1b",
                        "text-sub": "#4e4e97",
                        "border-color": "#d0d0e7",
                    },
                    fontFamily: {
                        "display": ["Inter", "Noto Sans KR", "sans-serif"],
                        "body": ["Inter", "Noto Sans KR", "sans-serif"],
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-text-main font-display antialiased min-h-screen flex flex-col">
<div class="relative flex h-full min-h-screen w-full flex-col overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<!-- Header -->
<header class="flex items-center justify-between border-b border-solid border-border-color bg-white px-6 py-4 md:px-10 dark:bg-background-dark dark:border-gray-800">
<div class="flex items-center gap-4 text-text-main dark:text-white">
<div class="size-8 text-primary">
<svg class="w-full h-full" fill="currentColor" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M42.4379 44C42.4379 44 36.0744 33.9038 41.1692 24C46.8624 12.9336 42.2078 4 42.2078 4L7.01134 4C7.01134 4 11.6577 12.932 5.96912 23.9969C0.876273 33.9029 7.27094 44 7.27094 44L42.4379 44Z"></path>
</svg>
</div>
<h2 class="text-xl font-bold leading-tight tracking-tight text-text-main dark:text-white">Cluverse</h2>
</div>
<div class="flex items-center gap-6">
<a class="text-sm font-medium text-text-sub hover:text-primary transition-colors dark:text-gray-400 dark:hover:text-white" href="#">도움말</a>
<a class="text-sm font-medium text-text-sub hover:text-primary transition-colors dark:text-gray-400 dark:hover:text-white" href="#">나가기</a>
</div>
</header>
<!-- Main Content Area -->
<main class="flex flex-1 justify-center py-8 px-4 sm:px-6 lg:px-8">
<div class="flex flex-col max-w-[640px] w-full flex-1 gap-8">
<!-- Stepper -->
<div class="flex flex-col gap-3">
<div class="flex justify-between items-center">
<p class="text-primary font-bold text-sm">Step 1/3</p>
<span class="text-text-sub text-xs dark:text-gray-500">학교 및 전공 선택</span>
</div>
<div class="h-2 w-full bg-gray-200 rounded-full overflow-hidden dark:bg-gray-700">
<div class="h-full bg-primary w-1/3 rounded-full"></div>
</div>
</div>
<!-- Title Section -->
<div class="text-center pt-4 pb-2">
<h1 class="text-3xl font-bold text-text-main dark:text-white mb-3">소속 학교와 전공을 알려주세요</h1>
<p class="text-text-sub dark:text-gray-400">정확한 정보를 입력하면 학교 인증과 커뮤니티 매칭이 쉬워집니다.</p>
</div>
<!-- Form Section -->
<div class="bg-white dark:bg-gray-800/50 rounded-xl p-6 sm:p-8 shadow-sm border border-border-color/50 dark:border-gray-700 flex flex-col gap-8">
<!-- School Search -->
<div class="flex flex-col gap-2">
<label class="text-sm font-bold text-text-main dark:text-white" for="school-search">학교 검색</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-text-sub dark:text-gray-500 group-focus-within:text-primary transition-colors">school</span>
</div>
<input class="block w-full rounded-lg border-border-color bg-background-light py-3.5 pl-12 pr-4 text-text-main placeholder-text-sub/70 focus:border-primary focus:ring-primary focus:bg-white transition-all dark:bg-gray-900 dark:border-gray-700 dark:text-white dark:focus:border-primary sm:text-sm" id="school-search" placeholder="학교명을 입력하세요 (예: 한국대학교)" type="text" value="한국대학교"/>
<div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-green-500">check_circle</span>
</div>
</div>
<!-- Selected School Badge Preview (Optional interaction state) -->
<div class="flex items-center gap-3 mt-2 p-3 bg-primary/5 rounded-lg border border-primary/10">
<div class="w-10 h-10 rounded-full bg-white flex items-center justify-center shadow-sm overflow-hidden border border-gray-100 p-1">
<img alt="University Logo" class="w-full h-full object-contain" data-alt="University crest logo in blue and gold" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBR83n7Y3-jojgi5tn44G1oQ9_qx3QeDRwZyyUIvh0oibdJ6I5qEM2ODB3NFKgTP7FTpWvqUyTk5Ytrl2azj80EdyKv6yuwkL3PsTV_vBQA4t8m6qfo80qvk309db75rZkeGYpHTnJ6rDk4c0jgrBC0ePrZYmkDA8unYw-apZ9KzGyCQy6Wdf70csrCb-6yokx09i8majt8rhLTR47DZ6bePnBSrtMrqdpFhjRgp60IQf9_WMFi16pulHq6OUedlJu_dZEX2U_mSsuQ"/>
</div>
<div class="flex flex-col">
<span class="text-sm font-bold text-text-main dark:text-white">한국대학교</span>
<span class="text-xs text-text-sub dark:text-gray-400">Seoul, Korea</span>
</div>
<button class="ml-auto text-xs text-text-sub hover:text-red-500 underline decoration-1 underline-offset-2">변경</button>
</div>
</div>
<div class="h-px bg-border-color/50 dark:bg-gray-700 w-full"></div>
<!-- Major Inputs -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Main Major -->
<div class="flex flex-col gap-2">
<label class="text-sm font-bold text-text-main dark:text-white" for="main-major">주전공 <span class="text-red-500">*</span></label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-text-sub dark:text-gray-500 group-focus-within:text-primary transition-colors">book_2</span>
</div>
<input class="block w-full rounded-lg border-border-color bg-background-light py-3.5 pl-12 pr-4 text-text-main placeholder-text-sub/70 focus:border-primary focus:ring-primary focus:bg-white transition-all dark:bg-gray-900 dark:border-gray-700 dark:text-white dark:focus:border-primary sm:text-sm" id="main-major" placeholder="학과/학부 입력" type="text"/>
</div>
</div>
<!-- Double/Minor Major -->
<div class="flex flex-col gap-2">
<label class="text-sm font-bold text-text-main dark:text-white flex items-center gap-2" for="sub-major">
                                    복수/부전공
                                    <span class="text-xs font-normal text-text-sub bg-gray-100 dark:bg-gray-700 px-2 py-0.5 rounded">선택사항</span>
</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-text-sub dark:text-gray-500 group-focus-within:text-primary transition-colors">library_books</span>
</div>
<input class="block w-full rounded-lg border-border-color bg-background-light py-3.5 pl-12 pr-4 text-text-main placeholder-text-sub/70 focus:border-primary focus:ring-primary focus:bg-white transition-all dark:bg-gray-900 dark:border-gray-700 dark:text-white dark:focus:border-primary sm:text-sm" id="sub-major" placeholder="학과/학부 입력" type="text"/>
</div>
</div>
</div>
<!-- Helper info -->
<div class="bg-gray-50 dark:bg-gray-900/50 p-4 rounded-lg flex items-start gap-3">
<span class="material-symbols-outlined text-primary text-xl mt-0.5">info</span>
<div class="text-xs text-text-sub dark:text-gray-400 leading-relaxed">
<p class="font-bold mb-1 text-text-main dark:text-gray-300">입력 가이드</p>
<ul class="list-disc list-inside space-y-1">
<li>재학 증명서에 기재된 정확한 학교명과 전공명을 입력해주세요.</li>
<li>아직 전공이 정해지지 않은 경우 '학부' 또는 '자율전공'으로 입력 가능합니다.</li>
</ul>
</div>
</div>
</div>
<!-- Action Button -->
<div class="flex flex-col items-center pt-4">
<button class="w-full bg-primary hover:bg-primary-hover text-white font-bold py-4 px-6 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.99] text-lg flex items-center justify-center gap-2 group">
                            다음 단계로
                            <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
<button class="mt-4 text-text-sub text-sm hover:text-text-main dark:hover:text-white underline decoration-transparent hover:decoration-current transition-all">
                            나중에 입력하기
                        </button>
</div>
</div>
</main>
</div>
</div>
</body></html>
